# ============================================================
#  E-Waste Collection System — Application Configuration
# ============================================================

spring.application.name=ewastecs

# --- DataSource (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/ewastecs?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# IMPORTANT: On first run use 'create' to create all tables including notifications.
# After first successful startup, change this back to 'update'.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- File Upload ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory (relative to project root)
app.upload.dir=uploads/ewastes

# --- Server ---
server.port=8080
server.error.whitelabel.enabled=false

# --- Email (Gmail SMTP) ---
# Replace with your Gmail address and App Password
# Generate App Password: Google Account -> Security -> 2FA -> App Passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=28rajath2007@gmil.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Set to false if you don't configure email yet (contact replies will be disabled)
app.mail.enabled=false
