<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Admin Login — E-Waste Recycling Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/ewaste.css}"/><script src="/js/loader.js" defer></script>
</head>
<body>
<!-- Loading screen -->
<div id="loading-screen">
  <div class="loader-logo"><div class="loader-logo-dot"></div> E-Waste Recycling Manager</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-text">Loading…</div>
</div>

<div class="auth-page">
  <div class="auth-bg-grid"></div><div class="auth-bg-glow"></div>
  <div class="auth-card">
    <div class="auth-logo"><div class="auth-logo-icon" style="background:#f87171;color:#fff;">&#9670;</div> Admin Portal</div>
    <p class="auth-subtitle">Restricted access — authorised personnel only</p>
    <div th:if="${param.error}" class="alert alert-error">Invalid email or password.</div>
    <div th:if="${param.wrongportal}" class="alert alert-error">This portal is for admins only.</div>
    <div th:if="${param.logout}" class="alert alert-success">Signed out successfully.</div>
    <form th:action="@{/login}" method="post">
      <input type="hidden" name="_portal" value="admin"/>
      <div class="form-group"><label class="form-label">Email</label>
        <input type="email" name="username" class="form-control" placeholder="admin@ewaste.com" required autofocus/></div>
      <div class="form-group"><label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/></div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Sign in as admin</button>
    </form>
    <div class="auth-footer mt-2">
      <a href="/client/login" class="text-muted text-sm">← Client login</a>
    </div>
  </div>
</div>

</body></html>
