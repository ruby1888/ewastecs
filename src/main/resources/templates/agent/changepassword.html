<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Change Password — E-Waste Recycling Management Network — Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/ewaste.css}"/><script src="/js/loader.js" defer></script>
</head>
<body>
<!-- Loading screen -->
<div id="loading-screen">
  <div class="loader-logo"><div class="loader-logo-dot"></div> E-Waste Recycling Manager</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-text">Loading…</div>
</div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="sidebar-logo"><span class="sidebar-logo-dot"></span> E-Waste Recycling Manager</div><div class="sidebar-role">Agent Portal</div></div>
    <nav class="sidebar-nav">
      <a href="/agent/dashboard">&#9632; Dashboard</a>
      <a href="/agent/pickups">&#128230; My pickups</a>
      <a href="/agent/pickup-requests">&#128270; Browse requests</a>
      <div class="sidebar-section-label">Account</div>
      <a href="/agent/profile">&#9737; Profile</a>
      <a href="/agent/change-password" class="active">&#128274; Change password</a>
    </nav>
    <div class="sidebar-footer"><a href="/logout" class="btn btn-sm btn-block" style="background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3);justify-content:flex-start;">&#8594; Sign out</a></div>
  </aside>
  <div class="main-content">
    <div class="page-header"><div class="page-title">Change password</div></div>
    <div class="content-area">
      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
      <div class="card" style="max-width:420px;">
        <div class="card-body">
          <form th:action="@{/agent/change-password}" method="post">
            <div class="form-group"><label class="form-label">Current password</label><input type="password" name="currentPassword" class="form-control" required/></div>
            <div class="form-group"><label class="form-label">New password</label><input type="password" name="newPassword" class="form-control" required/></div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-primary">Update password</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</body></html>
