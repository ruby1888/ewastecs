<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Agent Register — E-Waste Recycling Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/ewaste.css}"/>
  <script src="/js/loader.js" defer></script>
</head>
<body>
<div id="loading-screen">
  <div class="loader-logo"><div class="loader-logo-dot"></div> E-Waste Recycling Manager</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-text">Loading…</div>
</div>

<div class="auth-page">
  <div class="auth-bg-grid"></div><div class="auth-bg-glow"></div>
  <div class="auth-card" style="max-width:500px;">
    <div class="auth-logo"><div class="auth-logo-icon">🚚</div> Agent Registration</div>
    <p class="auth-subtitle">Apply to become a certified collector. Your license number is required for admin to verify you.</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/agent/register/save}" method="post">
      <div class="grid grid-2" style="gap:1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Full name</label>
          <input type="text" name="name" class="form-control" placeholder="Your full name" required/>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Mobile</label>
          <input type="tel" name="mobile" class="form-control" placeholder="9XXXXXXXXX"/>
        </div>
      </div>

      <div class="form-group mt-2">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6"/>
      </div>

      <!-- LICENSE — required at registration -->
      <div class="form-group" style="background:var(--green-light);border:1.5px solid #a7d7b5;border-radius:var(--radius-lg);padding:1rem 1.1rem;">
        <label class="form-label" style="color:var(--green);font-weight:700;">
          🪪 Collector License Number <span style="color:var(--accent-err);"> *</span>
        </label>
        <input type="text" name="licenseNumber" class="form-control" required
               placeholder="e.g. KA-EWASTE-2026-XXXXX"
               style="background:#fff;"/>
        <div style="font-size:.78rem;color:var(--green);margin-top:5px;">
          Your license will be reviewed by admin before your account is activated.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">City</label>
        <select name="cityId" class="form-control" required>
          <option value="">— Select your city —</option>
          <option th:each="c : ${cities}" th:value="${c.id}" th:text="${c.name}"></option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Address</label>
        <textarea name="address" class="form-control" rows="2" placeholder="Your pickup base address"></textarea>
      </div>

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Submit application →</button>
    </form>

    <div class="auth-footer mt-2">Already approved? <a href="/agent/login">Sign in here</a></div>
  </div>
</div>
</body></html>
