<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — E-Waste Recycling Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/ewaste.css}"/>
<script src="/js/loader.js" defer></script>
</head>
<body>
<!-- Loading screen -->
<div id="loading-screen">
  <div class="loader-logo"><div class="loader-logo-dot"></div> E-Waste Recycling Manager</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-text">Loading…</div>
</div>

<div class="auth-page">
  <div class="auth-bg-grid"></div>
  <div class="auth-bg-glow"></div>

  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <div class="auth-logo-icon">♻</div>
      E-Waste Recycling Manager
    </div>
    <p class="auth-subtitle">Create your client account — it's free</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/client/register/save}" method="post" th:object="${client}">
      <div class="grid grid-2" style="gap:1rem;">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Full name</label>
          <input type="text" th:field="*{name}" class="form-control" placeholder="John Doe" required/>
        </div>
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">Mobile</label>
          <input type="tel" th:field="*{mobile}" class="form-control" placeholder="9XXXXXXXXX"/>
        </div>
      </div>
      <div class="form-group mt-2">
        <label class="form-label">Email address</label>
        <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" th:field="*{password}" class="form-control" placeholder="Min. 8 characters" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <textarea th:field="*{address}" class="form-control" placeholder="Your pickup address" rows="2"></textarea>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create account</button>
    </form>

    <div class="auth-footer mt-2">
      Already have an account? <a href="/client/login">Sign in</a>
    </div>
  </div>
</div>

</body>
</html>
