<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Login — E-Waste Recycling Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/ewaste.css}"/>
<script src="/js/loader.js" defer></script>
</head>
<body>
<!-- Loading screen -->
<div id="loading-screen">
  <div class="loader-logo"><div class="loader-logo-dot"></div> E-Waste Recycling Manager</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-text">Loading…</div>
</div>

<div class="auth-page">
  <div class="auth-bg-grid"></div>
  <div class="auth-bg-glow"></div>
  <div class="auth-card">
    <div class="auth-logo"><div class="auth-logo-icon">&#9855;</div> E-Waste Recycling Manager</div>
    <p class="auth-subtitle">Sign in to your client account</p>
    <div th:if="${param.error}"        class="alert alert-error">Invalid email or password.</div>
    <div th:if="${param.wrongportal}"  class="alert alert-error">This portal is for clients only. Please use the correct login page.</div>
    <div th:if="${param.logout}"       class="alert alert-success">Signed out successfully.</div>
    <div th:if="${successMessage}"     class="alert alert-success" th:text="${successMessage}"></div>
    <form th:action="@{/login}" method="post">
      <input type="hidden" name="_portal" value="client"/>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="username" class="form-control" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Sign in</button>
    </form>
    <div class="auth-divider">or</div>
    <div class="auth-footer">Don't have an account? <a href="/client/register">Create one free</a></div>
    <div class="auth-footer mt-1">
      <a href="/agent/login" class="text-muted text-sm">Agent login →</a>
    </div>
  </div>
</div>
</body>
</html>
